# Bloomberg MCP FieldSet Definitions
# External configuration — editable without code changes.
#
# To add a new FieldSet:
#   1. Add an entry below with a unique name
#   2. List the Bloomberg field mnemonics
#   3. Restart the server (hot-reload not yet supported)
#
# FieldSets can be referenced by name in tool calls:
#   fields=["VALUATION", "MOMENTUM"]  -> expands to individual fields

